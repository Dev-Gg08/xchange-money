<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Cash Exchange - Premium Financial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Login Page -->
    <section id="login-view" class="view active full-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-icon"><i class="fas fa-wallet"></i></div>
                <h1>Welcome Back</h1>
                <p>Please log in to your account</p>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pin" placeholder="4-Digit PIN" maxlength="4" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Main Content (Hidden until login) -->
    <div id="main-content" style="display: none;">
        <div class="container">
            <!-- Home View -->
            <section id="home-view" class="view">
                <header class="header">
                    <div class="user-info">
                        <img src="https://ui-avatars.com/api/?name=User&background=e6ff55&color=121212" alt="Avatar"
                            class="avatar" id="user-avatar">
                        <div>
                            <span class="greeting">Hi, Welcome!</span>
                            <span class="username" id="display-username">User</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" id="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </header>

                <div class="balance-card">
                    <span class="currency-label">Total Balance</span>
                    <h1 class="balance-amount">฿<span id="display-balance">0.00</span></h1>
                    <span class="balance-change">Keep climbing! 🚀</span>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <span class="chart-title">Visual Stats</span>
                        <span class="chart-period">Daily <i class="fas fa-chevron-down"></i></span>
                    </div>
                    <div class="chart-viz" id="chart-container">
                        <!-- Bars generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Top-up View -->
            <section id="topup-view" class="view">
                <header class="header">
                    <h2 class="chart-title">Add Funds</h2>
                </header>

                <div class="payment-grid">
                    <div class="payment-card" data-channel="qr">
                        <img src="https://w7.pngwing.com/pngs/231/139/png-transparent-qr-code-computer-icons-barcode-scanning-coding-miscellaneous-angle-white.png"
                            alt="QR">
                        <h3>QR PromptPay</h3>
                    </div>
                    <div class="payment-card" data-channel="truemoney">
                        <img src="https://brand-truemoney.s3.ap-southeast-1.amazonaws.com/wp-content/uploads/2020/07/24103859/truemoney-wallet-logo.png"
                            alt="TrueMoney">
                        <h3>Wallet</h3>
                    </div>
                    <div class="payment-card" data-channel="angpao">
                        <img src="https://img.icons8.com/color/48/000000/packet.png" alt="Angpao">
                        <h3>Gift Link</h3>
                    </div>
                </div>
            </section>

            <!-- History View -->
            <section id="history-view" class="view">
                <header class="header">
                    <h2 class="chart-title">Transaction History</h2>
                </header>

                <div class="tabs-sub">
                    <button class="tab-sub-btn active" data-history="topup">Top-ups</button>
                    <button class="tab-sub-btn" data-history="exchange">Exchanges</button>
                </div>

                <div class="history-list" id="history-list-container">
                    <!-- History items injected here -->
                    <div class="empty-history">No history found</div>
                </div>
            </section>
        </div>

        <nav class="bottom-nav">
            <div class="nav-btn active" data-view="home"><i class="fas fa-home"></i></div>
            <div class="nav-btn" data-view="topup"><i class="fas fa-plus"></i></div>
            <div class="nav-btn" data-view="history"><i class="fas fa-history"></i></div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="topup-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Enter Amount</h2>
            <div class="modal-body">
                <input type="number" id="topup-amount" value="10" min="1">
                <button id="btn-topup-confirm" class="btn-primary">Generate QR</button>
            </div>
        </div>
    </div>

    <div id="qr-display-view" class="modal qr-modal">
        <div class="modal-content qr-content">
            <span class="close-qr-modal">&times;</span>
            <h2>Scan to Top-up</h2>
            <div id="qrcode-container"></div>
            <div class="qr-details">
                <p class="amount-text">฿<span id="display-amount">0.00</span></p>
                <p class="warning-text">Verification may take 1-2 minutes</p>
            </div>
            <button id="btn-download-qr" class="btn-secondary">Download QR</button>
            <button id="btn-cancel-topup" class="btn-primary cancel-btn" style="background: #ff5252;">I've paid</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
